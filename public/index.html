<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Dimensions Toy Tag Creator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">LEGO Dimensions Toy Tag Creator</h1>
        <form id="toyTagForm" class="mt-4">
            <div class="mb-3">
                <label for="nfcUid" class="form-label">Enter NFC UID (14 Hexadecimal Characters)</label>
                <input type="text" class="form-control" id="nfcUid" placeholder="e.g., 1234567890ABCDEF" required>
            </div>
            <div class="mb-3">
                <label for="characterSelect" class="form-label">Select Character or Vehicle</label>
                <select class="form-select" id="characterSelect" required>
                    <option value="">Choose...</option>
                    <!-- Options will be dynamically populated -->
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Generate</button>
        </form>
        <div id="output" class="mt-5">
            <!-- Generated NFC lines will be displayed here -->
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main JS -->
    <script src="../src/main.js"></script>
</body>
</html>
